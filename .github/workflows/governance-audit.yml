name: Governance Audit

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  governance-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install verifier dependencies
        run: python -m pip install -r requirements.txt

      - name: Validate version-controlled main ruleset
        run: python -m registry_governance validate

      - name: Exercise emergency unpublish and rollback
        id: drill
        continue-on-error: true
        run: |
          python -m registry_governance rollback-drill \
            --report governance-drill-report.json

      - name: Preserve governance drill evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: governance-drill-report
          path: governance-drill-report.json
          if-no-files-found: error
          retention-days: 30

      - name: Enforce governance drill result
        if: always()
        env:
          DRILL_OUTCOME: ${{ steps.drill.outcome }}
        shell: bash
        run: |
          if [ "$DRILL_OUTCOME" != "success" ]; then
            echo "Emergency-unpublish and rollback drill failed."
            exit 1
          fi
