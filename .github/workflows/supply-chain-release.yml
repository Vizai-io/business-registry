name: Build and Attest Registry Snapshot

on:
  push:
    branches:
      - main
    tags:
      - "registry-v*"
  workflow_dispatch:

permissions: {}

jobs:
  build-and-attest:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install verifier dependencies
        run: python -m pip install -r requirements.txt

      - name: Verify public artifacts and committed manifest
        run: |
          python -m registry_verify
          python -m registry_supply_chain check-manifest

      - name: Build reproducible release snapshot
        run: python -m registry_supply_chain snapshot --output dist

      - name: Generate signed SLSA build provenance
        id: attestation
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-checksums: dist/SHA256SUMS

      - name: Preserve portable Sigstore bundle
        env:
          BUNDLE_PATH: ${{ steps.attestation.outputs.bundle-path }}
        shell: bash
        run: cp "$BUNDLE_PATH" dist/registry-snapshot.sigstore.json

      - name: Preserve snapshot, manifest, and checksums
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: registry-release-${{ github.sha }}
          path: dist/
          if-no-files-found: error
          retention-days: 90

  publish-tagged-release:
    if: startsWith(github.ref, 'refs/tags/registry-v')
    needs: build-and-attest
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download attested release assets
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5
        with:
          name: registry-release-${{ github.sha }}
          path: dist

      - name: Create or refresh GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        shell: bash
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" dist/* --clobber
          else
            gh release create "$TAG" dist/* \
              --verify-tag \
              --generate-notes \
              --title "VizAI Registry $TAG"
          fi
