name: Verify Canonical Registry

on:
  pull_request:
    paths:
      - "registry/**/*.json"
      - "index/**"
      - "schema/entity-profile-v1.0.schema.json"
      - "tools/build_indexes.py"
      - "tools/validation/**"
  push:
    branches:
      - main
    paths:
      - "registry/**/*.json"
      - "index/**"
      - "schema/entity-profile-v1.0.schema.json"
      - "tools/build_indexes.py"
      - "tools/validation/**"

permissions:
  contents: read

jobs:
  verify-canonical-registry:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r tools/validation/requirements.txt

      - name: Validate canonical entity profiles
        run: |
          python tools/validation/validate-entity-profile.py registry/*/profile.json

      - name: Check canonical identities
        run: |
          python tools/validation/check-registry-duplicates.py

      - name: Verify generated indexes are current
        run: |
          python tools/build_indexes.py
          git diff --exit-code -- index
