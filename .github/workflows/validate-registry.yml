name: Verify Canonical Registry

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  verify-canonical-registry:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install verifier dependencies
        run: |
          python -m pip install -r requirements.txt

      - name: Run authoritative registry verifier
        id: verifier
        continue-on-error: true
        run: |
          python -m registry_verify --report registry-verification-report.json

      - name: Run verifier test suite
        id: tests
        continue-on-error: true
        run: |
          python -m unittest discover -s tests -v

      - name: Preserve machine-readable verification report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: registry-verification-report
          path: registry-verification-report.json
          if-no-files-found: error
          retention-days: 30

      - name: Enforce verification and test results
        if: always()
        env:
          VERIFIER_OUTCOME: ${{ steps.verifier.outcome }}
          TEST_OUTCOME: ${{ steps.tests.outcome }}
        run: |
          if [ "$VERIFIER_OUTCOME" != "success" ] || [ "$TEST_OUTCOME" != "success" ]; then
            echo "Authoritative registry verification or tests failed."
            exit 1
          fi
